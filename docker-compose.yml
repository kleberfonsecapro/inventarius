services:
  db:
    image: postgres:16-alpine
    container_name: inventarius_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: inventarius
      POSTGRES_USER: inventarius
      POSTGRES_PASSWORD: inventarius123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventarius -d inventarius"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: inventarius_web
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DB_NAME=inventarius
      - DB_USER=inventarius
      - DB_PASSWORD=inventarius123
      - DB_HOST=db
      - DB_PORT=5432
      - SECRET_KEY=dev-secret-key-change-in-production
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
